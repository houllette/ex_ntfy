name: Publish to Hex

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and validate the package, do not publish"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Gates + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.20"
          otp-version: "29"

      - name: Cache deps
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Cache PLTs
        uses: actions/cache@v6
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check tag matches mix.exs version
        if: github.event_name == 'push'
        run: |
          VERSION=$(grep -m1 '@version "' mix.exs | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ github.ref_name }}" != "v$VERSION" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match mix.exs version v$VERSION"
            exit 1
          fi

      - name: Check whether this version is already on Hex
        id: hex_version
        run: |
          VERSION=$(grep -m1 '@version "' mix.exs | sed 's/.*"\(.*\)".*/\1/')
          if curl -fsS "https://hex.pm/api/packages/ex_ntfy/releases/$VERSION" > /dev/null 2>&1; then
            echo "ex_ntfy $VERSION is already published — publish steps will be skipped."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      - name: Run tests
        run: mix test --warnings-as-errors

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Check docs build warning-free
        run: mix docs --warnings-as-errors

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: mix hex.publish --dry-run --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Publish
        if: >-
          steps.hex_version.outputs.published == 'false' &&
          (github.event_name == 'push' ||
           (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
